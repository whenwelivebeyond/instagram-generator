<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post Generator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <button class="menu-button" id="menuButton" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <h1 id="pageTitle">Content Generator</h1>
    </header>

    <nav class="side-menu" id="sideMenu" aria-label="Primary navigation">
      <button class="nav-item active" type="button" data-page="generator">Content Generator</button>
      <button class="nav-item" type="button" data-page="captions">Caption Center</button>
      <button class="nav-item" type="button" data-page="hashtags">Hashtags</button>
    </nav>
    <div class="menu-scrim" id="menuScrim"></div>

    <main class="app-shell">
      <section class="page active" id="generatorPage" data-title="Content Generator">
        <div class="generator-layout">
          <section class="preview-panel" aria-label="Post preview">
            <canvas id="previewCanvas" width="1080" height="1920"></canvas>
          </section>

          <section class="controls-panel" aria-label="Post controls">
            <div class="control-group">
              <label for="accountSelect">Account</label>
              <select id="accountSelect">
                <option value="pawsitive">pawsitive.husky</option>
                <option value="donkey">the.corporate.donkey</option>
                <option value="cow">the.mooing.aunty</option>
              </select>
            </div>

            <div class="control-group" id="backgroundControl">
              <label>Background</label>
              <div class="background-grid" id="backgroundGrid"></div>
            </div>

            <div class="control-group">
              <label for="huskyPickerButton">Pose selector</label>
              <div class="image-select" id="huskySelect">
                <button class="image-select-button" id="huskyPickerButton" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
                <div class="image-options" id="huskyOptions" role="listbox"></div>
              </div>
            </div>

            <div class="control-group">
              <label for="savedCaptionSelect">Saved caption</label>
              <select id="savedCaptionSelect"></select>
            </div>

            <div class="control-group">
              <div class="caption-label-row">
                <label for="captionInput">Caption</label>
                <button class="label-icon-button" id="resetCaptionButton" type="button" aria-label="Reset caption" title="Reset caption"><img src="assets/icons/Reset.svg" alt=""></button>
              </div>
              <textarea id="captionInput" rows="6" spellcheck="true" placeholder="enter caption here"></textarea>
            </div>

            <div class="control-group">
              <label for="hashtagsInput">Hashtags</label>
              <textarea id="hashtagsInput" rows="3" spellcheck="false" placeholder="#hashtag1 #hashtag2 #hashtag3 #hashtag4 #hashtag5"></textarea>
            </div>

            <div class="control-row">
              <div class="control-group compact">
                <label>Alignment</label>
                <div class="segmented" id="alignmentButtons"></div>
              </div>

              <div class="control-group compact" id="textColorControl">
                <label>Text color</label>
                <div class="swatches" id="textColorButtons">
                  <button class="swatch active" type="button" data-color="#FFFFFF" aria-label="White text">
                  <span style="background:#FFFFFF"></span>
                </button>
                <button class="swatch" type="button" data-color="#252525" aria-label="Black text">
                <span style="background:#252525"></span>
                </button>
                </div>
              </div>
            </div>

            

            <button class="download-button" id="downloadButton" type="button">Download JPEG</button>
          </section>
        </div>
      </section>

      <section class="page" id="captionsPage" data-title="Caption Center">
        <div class="caption-center">
          <section class="caption-form">
            <div class="control-group">
              <label for="captionAccountSelect">Account</label>
              <select id="captionAccountSelect">
                <option value="pawsitive_husky">Pawsitive.husky</option>
                <option value="corporate_donkey">The.corporate.donkey</option>
                <option value="mooing_aunty">The.mooing.aunty</option>
              </select>
            </div>
            <div class="control-group">
              <div class="caption-label-row">
                <label for="captionCenterInput">Caption</label>
                <button class="label-icon-button" id="resetCaptionCenterButton" type="button" aria-label="Reset caption" title="Reset caption"><img src="assets/icons/Reset.svg" alt=""></button>
              </div>
              <textarea id="captionCenterInput" rows="8" spellcheck="true"></textarea>
            </div>
            <button class="download-button" id="saveCaptionButton" type="button">Save Caption</button>
            <p class="storage-status" id="captionStorageStatus" role="status"></p>
          </section>

          <section class="caption-table-wrap" id="captionTableWrap">
            <div class="caption-table-header">
              <div>
                <h2>Saved captions</h2>
                <p class="caption-list-subtitle" id="captionListSubtitle">Showing all captions</p>
              </div>
              <div class="caption-toolbar" id="captionToolbar">
                <div class="caption-search" id="captionSearch">
                  <button class="toolbar-button" type="button" data-action="open-search" aria-label="Search captions" title="Search"><img src="assets/icons/Search.svg" alt=""></button>
                  <div class="search-field" id="searchField">
                    <input id="captionSearchInput" type="search" placeholder="Search captions">
                    <button class="toolbar-button" type="button" data-action="close-search" aria-label="Close search">×</button>
                  </div>
                </div>
                <div class="toolbar-menu">
                  <button class="toolbar-button" type="button" data-action="toggle-filter" aria-label="Filter captions" title="Filter"><img src="assets/icons/Filter.svg" alt=""></button>
                  <div class="toolbar-popover" id="filterMenu">
                    <button type="button" data-filter="used">Used</button>
                    <button type="button" data-filter="unused">Unused</button>
                    <button type="button" data-filter="all">All</button>
                  </div>
                </div>
                <div class="toolbar-menu">
                  <button class="toolbar-button" type="button" data-action="toggle-sort" aria-label="Sort captions" title="Sort"><img src="assets/icons/Sort.svg" alt=""></button>
                  <div class="toolbar-popover" id="sortMenu">
                    <button type="button" data-sort="default">Default</button>
                    <button type="button" data-sort="latest">Latest</button>
                    <button type="button" data-sort="earliest">Earliest</button>
                  </div>
                </div>
                <div class="management-toolbar" id="managementToolbar">
                  <button class="toolbar-button" type="button" data-action="undo" aria-label="Undo" title="Undo"><img src="assets/icons/Undo.svg" alt=""></button>
                  <button class="toolbar-button" type="button" data-action="redo" aria-label="Redo" title="Redo"><img src="assets/icons/Redo.svg" alt=""></button>
                  <button class="management-done-button" type="button" data-action="exit-management">Done</button>
                </div>
              </div>
            </div>
            <table class="caption-table">
              <tbody id="captionTableBody"></tbody>
            </table>
            <nav class="caption-pagination" id="captionPagination" aria-label="Caption pages"></nav>
          </section>
        </div>
      </section>

      <section class="page" id="hashtagsPage" data-title="Hashtags">
        <div class="hashtags-page" id="hashtagsPageContent"></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
